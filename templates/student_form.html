{% extends 'base.html' %}
{% block title %}O'quvchi - EduLibrary{% endblock %}
{% block page_title %}{{ "O'quvchi tahrirlash" if student else "Yangi o'quvchi qo'shish" }}{% endblock %}
{% block content %}
<div class="card" style="max-width:720px;">
  <form method="POST">
    <div style="margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border);">
      <strong style="font-size:13px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px;">Shaxsiy ma'lumotlar</strong>
    </div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1;">
        <label>F.I.Sh. (To'liq ism) *</label>
        <input class="form-control" type="text" name="full_name" value="{{ student.full_name if student else '' }}" placeholder="Aliyev Bobur Mansurovich" required>
      </div>
      <div class="form-group">
        <label>O'quvchi ID *</label>
        <input class="form-control" type="text" name="student_id" value="{{ student.student_id if student else '' }}" placeholder="S001" required>
      </div>
      <div class="form-group">
        <label>Sinf *</label>
        <select class="form-control" name="grade" required>
          <option value="">Sinf tanlang</option>
          {% for g in grades %}
          <option value="{{ g }}" {% if student and student.grade == g %}selected{% endif %}>{{ g }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Jinsi</label>
        <select class="form-control" name="gender">
          <option value="">Tanlang</option>
          <option value="erkak" {% if student and student.gender == 'erkak' %}selected{% endif %}>Erkak</option>
          <option value="ayol" {% if student and student.gender == 'ayol' %}selected{% endif %}>Ayol</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tug'ilgan sana</label>
        <input class="form-control" type="date" name="date_of_birth" value="{{ student.date_of_birth.strftime('%Y-%m-%d') if student and student.date_of_birth else '' }}">
      </div>
    </div>

    <div style="margin:16px 0; padding-bottom:12px; border-bottom:1px solid var(--border);">
      <strong style="font-size:13px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px;">Aloqa ma'lumotlari</strong>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Telefon raqami</label>
        <input class="form-control" type="text" name="phone" value="{{ student.phone if student else '' }}" placeholder="+998901234567">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input class="form-control" type="email" name="email" value="{{ student.email if student else '' }}" placeholder="student@example.com">
      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label>Manzil</label>
        <input class="form-control" type="text" name="address" value="{{ student.address if student else '' }}" placeholder="Toshkent sh., Yunusobod t., 5-uy">
      </div>
    </div>

    <div style="margin:16px 0; padding-bottom:12px; border-bottom:1px solid var(--border);">
      <strong style="font-size:13px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px;">Ota-ona ma'lumotlari</strong>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Ota-ona ismi</label>
        <input class="form-control" type="text" name="parent_name" value="{{ student.parent_name if student else '' }}" placeholder="Aliyev Mansur">
      </div>
      <div class="form-group">
        <label>Ota-ona telefoni</label>
        <input class="form-control" type="text" name="parent_phone" value="{{ student.parent_phone if student else '' }}" placeholder="+998901234560">
      </div>
    </div>

    <div class="form-group">
      <label>Izoh</label>
      <textarea class="form-control" name="notes" placeholder="Qo'shimcha ma'lumotlar...">{{ student.notes if student else '' }}</textarea>
    </div>

    <div style="display:flex; gap:10px; margin-top:8px;">
      <button class="btn btn-primary" type="submit">{{ 'Saqlash' if student else "Qo'shish" }}</button>
      <a href="{{ url_for('student_detail', id=student.id) if student else url_for('students') }}" class="btn btn-secondary">Bekor qilish</a>
    </div>
  </form>
</div>
{% endblock %}
